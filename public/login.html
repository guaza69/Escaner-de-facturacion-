<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluciones Mana - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
            --error: #ef4444;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 20%, rgba(34,211,238,0.1) 0%, transparent 50%);
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p { color: var(--text-dim); font-size: 0.9rem; margin-top: 0.25rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.5rem; }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            padding: 0.875rem 1rem;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
        }

        .recordar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .recordar input { width: auto; }

        .btn-login {
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.025em;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99,102,241,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>Soluciones Mana</h1>
            <p>Sistema de Control de Facturación</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="admin" autocomplete="username" required />
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
            <label class="recordar">
                <input type="checkbox" id="recordar" />
                Recordarme por 30 días
            </label>
            <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesión</button>
        </form>

        <div id="alerta" class="alert"></div>
    </div>

    <script>
        // Si ya hay sesión, ir al dashboard
        fetch('../api/session_check.php')
            .then(r => r.json())
            .then(d => { if (d.ok) window.location.href = 'dashboard.html'; })
            .catch(() => {});

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const alerta = document.getElementById('alerta');
            alerta.style.display = 'none';
            btn.disabled = true;
            btn.innerText = 'Verificando...';

            try {
                const res = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuario: document.getElementById('usuario').value,
                        password: document.getElementById('password').value,
                        recordar: document.getElementById('recordar').checked
                    })
                });
                const data = await res.json();

                if (data.ok) {
                    alerta.className = 'alert alert-success';
                    alerta.innerText = `✅ Bienvenido, ${data.nombre}`;
                    alerta.style.display = 'block';
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    alerta.className = 'alert alert-error';
                    alerta.innerText = '❌ ' + (data.error || 'Error al iniciar sesión');
                    alerta.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Iniciar Sesión';
                }
            } catch (err) {
                alerta.className = 'alert alert-error';
                alerta.innerText = '❌ Error de conexión. Verifica que el servidor esté activo.';
                alerta.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Iniciar Sesión';
            }
        });
    </script>
</body>
</html>
